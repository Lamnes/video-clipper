# Railway config-as-code — https://docs.railway.com/reference/config-as-code
#
# Secrets and the /data volume are NOT configured here (Railway has no config-as-code
# for either) — set them in the dashboard. See "Деплой на Railway" in README.md.
#
# No startCommand: the Dockerfile's ENTRYPOINT ["video-clipper"] runs the binary,
# and it reads all configuration from environment variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
